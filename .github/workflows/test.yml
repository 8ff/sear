name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o sear .

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y age

      - name: Run tests
        run: ./test-sear.sh
